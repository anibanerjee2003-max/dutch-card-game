<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#217a40"/>
      <stop offset="100%" stop-color="#14502a"/>
    </linearGradient>
  </defs>

  <!-- Green poker table background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- DUTCH title -->
  <text x="256" y="148"
        font-family="Georgia, serif"
        font-size="104"
        font-weight="bold"
        fill="#f5c518"
        text-anchor="middle"
        letter-spacing="6">DUTCH</text>

  <!-- Card 1: far left, tilted -22deg -->
  <g transform="rotate(-22, 128, 330)">
    <rect x="83" y="265" width="90" height="130" rx="10" fill="white"/>
    <rect x="87" y="269" width="82" height="122" rx="8" fill="#1e40af"/>
    <rect x="93" y="275" width="70" height="110" rx="5" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <text x="128" y="344" font-size="30" fill="#93c5fd" text-anchor="middle">♠</text>
  </g>

  <!-- Card 2: tilted -7deg -->
  <g transform="rotate(-7, 202, 310)">
    <rect x="157" y="245" width="90" height="130" rx="10" fill="white"/>
    <rect x="161" y="249" width="82" height="122" rx="8" fill="#1e40af"/>
    <rect x="167" y="255" width="70" height="110" rx="5" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <text x="202" y="324" font-size="30" fill="#93c5fd" text-anchor="middle">♠</text>
  </g>

  <!-- Card 3: tilted +7deg -->
  <g transform="rotate(7, 310, 310)">
    <rect x="265" y="245" width="90" height="130" rx="10" fill="white"/>
    <rect x="269" y="249" width="82" height="122" rx="8" fill="#1e40af"/>
    <rect x="275" y="255" width="70" height="110" rx="5" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <text x="310" y="324" font-size="30" fill="#93c5fd" text-anchor="middle">♠</text>
  </g>

  <!-- Card 4: far right, tilted +22deg -->
  <g transform="rotate(22, 384, 330)">
    <rect x="339" y="265" width="90" height="130" rx="10" fill="white"/>
    <rect x="343" y="269" width="82" height="122" rx="8" fill="#1e40af"/>
    <rect x="349" y="275" width="70" height="110" rx="5" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <text x="384" y="344" font-size="30" fill="#93c5fd" text-anchor="middle">♠</text>
  </g>
</svg>